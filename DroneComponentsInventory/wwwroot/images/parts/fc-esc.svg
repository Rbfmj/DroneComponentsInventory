  <line x1="8"  y1="32" x2="12" y2="32" stroke="#6c5ce7" stroke-width="1.5"/>
  <line x1="8"  y1="42" x2="12" y2="42" stroke="#6c5ce7" stroke-width="1.5"/>
  <line x1="52" y1="22" x2="56" y2="22" stroke="#6c5ce7" stroke-width="1.5"/>
  <line x1="52" y1="32" x2="56" y2="32" stroke="#6c5ce7" stroke-width="1.5"/>
  <line x1="52" y1="42" x2="56" y2="42" stroke="#6c5ce7" stroke-width="1.5"/>
</svg>
