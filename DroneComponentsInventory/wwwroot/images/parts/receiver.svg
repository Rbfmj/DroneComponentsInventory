  <circle cx="14" cy="6" r="2.5" fill="#fdcb6e"/>
  <!-- Antenna 2 -->
  <line x1="42" y1="22" x2="50" y2="6" stroke="#fdcb6e" stroke-width="2" stroke-linecap="round"/>
  <circle cx="50" cy="6" r="2.5" fill="#fdcb6e"/>
  <!-- Connector pins -->
  <rect x="20" y="46" width="4" height="6" rx="1" fill="#fdcb6e" opacity="0.7"/>
  <rect x="27" y="46" width="4" height="6" rx="1" fill="#fdcb6e" opacity="0.7"/>
  <rect x="34" y="46" width="4" height="6" rx="1" fill="#fdcb6e" opacity="0.7"/>
