<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <!-- VTX board -->
  <rect x="14" y="20" width="36" height="28" rx="4" fill="rgba(0,184,148,0.10)" stroke="#00b894" stroke-width="2"/>
  <!-- Chip -->
  <rect x="24" y="27" width="16" height="14" rx="2" fill="#00b894" opacity="0.7"/>
  <!-- Antenna connector -->
  <line x1="32" y1="20" x2="32" y2="10" stroke="#00b894" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Antenna arms -->
  <line x1="24" y1="14" x2="40" y2="14" stroke="#00b894" stroke-width="2" stroke-linecap="round"/>
  <line x1="20" y1="10" x2="44" y2="10" stroke="#00b894" stroke-width="1.5" stroke-linecap="round"/>
  <!-- Signal waves -->
  <path d="M10 36 Q6 32 10 28" stroke="#00b894" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
  <path d="M54 36 Q58 32 54 28" stroke="#00b894" stroke-width="1.5" stroke-linecap="round" fill="none" opacity="0.6"/>
</svg>
