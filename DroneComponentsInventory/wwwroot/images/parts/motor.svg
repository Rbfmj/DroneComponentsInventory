<svg viewBox="0 0 500 500" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <symbol id="spoke-segment">
      <path d="M 250,50 
               A 200,200 0 0,1 350,76 
               L 320,150 
               A 80,80 0 0,0 250,130 
               Z" 
            fill="#1a1a1a" stroke="#000" stroke-width="2"/>
      
      <path d="M 260,70 
               A 180,180 0 0,1 330,95 
               L 310,140 
               A 70,70 0 0,0 260,125 
               Z" 
            fill="#333" />
            
      <circle cx="250" cy="65" r="5" fill="#ccc" stroke="#000" />
    </symbol>
  </defs>

  <circle cx="250" cy="250" r="205" fill="black" stroke="#333" stroke-width="4"/>

  <g id="spokes">
    <use href="#spoke-segment" transform="rotate(0, 250, 250)" />
    <use href="#spoke-segment" transform="rotate(60, 250, 250)" />
    <use href="#spoke-segment" transform="rotate(120, 250, 250)" />
    <use href="#spoke-segment" transform="rotate(180, 250, 250)" />
    <use href="#spoke-segment" transform="rotate(240, 250, 250)" />
    <use href="#spoke-segment" transform="rotate(300, 250, 250)" />
  </g>

  <g id="hub">
    <circle cx="250" cy="210" r="12" fill="white" stroke="#333" />
    <circle cx="288" cy="238" r="12" fill="white" stroke="#333" />
    <circle cx="273" cy="282" r="12" fill="white" stroke="#333" />
    <circle cx="227" cy="282" r="12" fill="white" stroke="#333" />
    <circle cx="212" cy="238" r="12" fill="white" stroke="#333" />
    
    <circle cx="250" cy="250" r="25" fill="#999" stroke="#333" stroke-width="3" />
    <circle cx="250" cy="250" r="18" fill="#bbb" stroke="#333" stroke-width="1" />
  </g>
</svg>
